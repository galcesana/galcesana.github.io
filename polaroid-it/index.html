<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLAROID GENERATOR.</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Work+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #F7F6F3; 
            --bg-panel: #FFFFFF;
            --ink-black: #1A1A1A; 
            --ink-light: #737373;
            --accent-red: #D14949; 
            --border-color: #E2E2E2;
            --radius: 2px; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Work Sans', sans-serif;
            background-color: var(--bg-base);
            color: var(--ink-black);
            line-height: 1.5;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 1100px;
            width: 100%;
        }

        @media (min-width: 800px) {
            .container {
                flex-direction: row;
                align-items: stretch;
            }
        }

        .controls, .preview-area {
            flex: 1;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
        }

        .controls {
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .preview-area {
            background-color: #EFEFEF; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background-image: 
                linear-gradient(var(--border-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 20px 20px; 
        }

        h1 {
            font-weight: 900;
            font-size: 32px;
            letter-spacing: -1px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: var(--ink-light);
            font-size: 14px;
            margin-bottom: 40px;
        }

        .drop-zone {
            border: 2px dashed var(--border-color);
            border-radius: var(--radius);
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 30px;
            background: var(--bg-base);
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--ink-black);
            background: #fff;
        }

        .drop-zone span {
            display: block;
            font-weight: 700;
            margin-bottom: 10px;
        }

        input[type="file"] {
            display: none;
        }

        .input-group {
            margin-bottom: auto; 
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--ink-light);
        }

        .input-group input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 16px;
            font-family: inherit;
            background: var(--bg-base);
            transition: border-color 0.2s;
        }

        .input-group input[type="text"]:focus {
            outline: none;
            border-color: var(--ink-black);
        }

        .btn {
            font-family: 'Work Sans', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 18px 24px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.1s, background 0.2s;
            width: 100%;
        }

        .btn:active {
            transform: translateY(2px);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--ink-black);
            color: var(--ink-black);
            padding: 10px 20px;
        }

        .btn-outline:hover:not(:disabled) {
            background: var(--ink-black);
            color: #fff;
        }

        .btn-outline:disabled {
            border-color: var(--border-color);
            color: var(--border-color);
            cursor: not-allowed;
            transform: none;
        }

        .btn-accent {
            background-color: var(--accent-red);
            color: #fff;
        }

        .btn-accent:hover:not(:disabled) {
            background-color: #B93C3C;
        }

        .btn-accent:disabled {
            background-color: var(--border-color);
            color: var(--ink-light);
            cursor: not-allowed;
            transform: none;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        canvas {
            max-width: 100%;
            height: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);
            background: #fff;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="controls">
            <div>
                <h1>Polaroid.</h1>
                <p class="subtitle">Upload. Write. Export.</p>
            </div>
            
            <div class="drop-zone" id="dropZone">
                <span>DRAG & DROP IMAGE</span>
                <p style="font-size: 12px; color: var(--ink-light); margin-bottom: 15px;">JPG or PNG format</p>
                <button class="btn btn-outline" style="width: auto;" onclick="document.getElementById('fileInput').click()">BROWSE FILES</button>
                <input type="file" id="fileInput" accept="image/png, image/jpeg, image/jpg">
            </div>

            <div class="input-group">
                <label for="captionInput">Caption (Sharpie Style)</label>
                <input type="text" id="captionInput" placeholder="New York, 2016..." maxlength="35">
            </div>

            <div class="button-group">
                <button class="btn btn-accent" id="downloadBtn" disabled>Export Polaroid</button>
                <button class="btn btn-outline" id="downloadPhotoBtn" disabled>Export Photo Only</button>
            </div>
        </div>

        <div class="preview-area">
            <canvas id="polaroidCanvas"></canvas>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const captionInput = document.getElementById('captionInput');
        const canvas = document.getElementById('polaroidCanvas');
        const ctx = canvas.getContext('2d');
        const downloadBtn = document.getElementById('downloadBtn');
        const downloadPhotoBtn = document.getElementById('downloadPhotoBtn');

        let currentImage = null;

        // Polaroid Dimensions
        const P_WIDTH = 600;
        const P_HEIGHT = 720;
        const BORDER_SIDES = 32;
        const BORDER_BOTTOM = 148;
        const IMAGE_SIZE = P_WIDTH - (BORDER_SIDES * 2);

        canvas.width = P_WIDTH;
        canvas.height = P_HEIGHT;

        // Vintage Filter String used in both functions
        const VINTAGE_FILTER = 'sepia(0.3) contrast(1.25) brightness(0.95) saturate(0.85)';

        // Drag & Drop Handling
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        captionInput.addEventListener('input', () => {
            if (currentImage) renderPolaroid();
        });

        function handleFile(file) {
            if (!file.type.match('image.*')) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    currentImage = img;
                    downloadBtn.disabled = false;
                    downloadPhotoBtn.disabled = false;
                    document.fonts.ready.then(renderPolaroid);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function renderPolaroid() {
            if (!currentImage) return;

            // 1. Base Frame
            ctx.fillStyle = '#FDFDFD'; 
            ctx.fillRect(0, 0, P_WIDTH, P_HEIGHT);

            // Inner dark border
            ctx.fillStyle = '#E8E8E8';
            ctx.fillRect(BORDER_SIDES - 1, BORDER_SIDES - 1, IMAGE_SIZE + 2, IMAGE_SIZE + 2);

            // 2. Image Cropping (Square Cover for the Polaroid preview)
            const imgRatio = currentImage.width / currentImage.height;
            let drawWidth, drawHeight, offsetX, offsetY;

            if (imgRatio > 1) {
                drawHeight = currentImage.height;
                drawWidth = currentImage.height;
                offsetX = (currentImage.width - drawWidth) / 2;
                offsetY = 0;
            } else {
                drawWidth = currentImage.width;
                drawHeight = currentImage.width;
                offsetX = 0;
                offsetY = (currentImage.height - drawHeight) / 2;
            }

            // 3. Vintage Filters
            ctx.filter = VINTAGE_FILTER;
            ctx.drawImage(
                currentImage,
                offsetX, offsetY, drawWidth, drawHeight,
                BORDER_SIDES, BORDER_SIDES, IMAGE_SIZE, IMAGE_SIZE
            );

            // 4. Noise/Grain
            ctx.filter = 'none'; 
            applyNoiseToCanvas(ctx, BORDER_SIDES, BORDER_SIDES, IMAGE_SIZE, IMAGE_SIZE);

            // 5. Handwritten Caption
            const caption = captionInput.value.trim();
            if (caption) {
                ctx.fillStyle = '#1A1A1A'; 
                ctx.save();
                ctx.translate(P_WIDTH / 2, P_HEIGHT - (BORDER_BOTTOM / 2) + 5);
                ctx.rotate(-0.02); 
                
                ctx.font = '46px Caveat, cursive';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(caption, 0, 0);
                ctx.restore();
            }
        }

        // Reusable grain function that works on any given canvas region
        function applyNoiseToCanvas(context, x, y, width, height) {
            const imgData = context.getImageData(x, y, width, height);
            const data = imgData.data;
            const noiseIntensity = 18; 

            for (let i = 0; i < data.length; i += 4) {
                const noise = (Math.random() - 0.5) * noiseIntensity;
                data[i] += noise; 
                data[i + 1] += noise; 
                data[i + 2] += noise; 
            }
            context.putImageData(imgData, x, y);
        }

        // --- DOWNLOAD FULL POLAROID ---
        downloadBtn.addEventListener('click', () => {
            if (!currentImage) return;
            const link = document.createElement('a');
            link.download = `POLAROID-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        // --- DOWNLOAD PHOTO ONLY (FULL, UNCUT, VINTAGE) ---
        downloadPhotoBtn.addEventListener('click', () => {
            if (!currentImage) return;
            
            // Create a temporary off-screen canvas matching the ORIGINAL image dimensions
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = currentImage.width;
            tempCanvas.height = currentImage.height;
            const tempCtx = tempCanvas.getContext('2d');

            // Apply the exact same vintage filters
            tempCtx.filter = VINTAGE_FILTER;
            
            // Draw the full, uncut image onto the temporary canvas
            tempCtx.drawImage(currentImage, 0, 0, tempCanvas.width, tempCanvas.height);

            // Remove the CSS filter to avoid double-processing and add the film grain
            tempCtx.filter = 'none';
            applyNoiseToCanvas(tempCtx, 0, 0, tempCanvas.width, tempCanvas.height);

            // Download the full uncut image
            const link = document.createElement('a');
            link.download = `VINTAGE-FULL-${Date.now()}.png`;
            link.href = tempCanvas.toDataURL('image/png', 1.0); // 1.0 for highest quality
            link.click();
        });

        // Initial Empty State
        ctx.fillStyle = '#FDFDFD';
        ctx.fillRect(0, 0, P_WIDTH, P_HEIGHT);
        ctx.fillStyle = '#F0F0F0'; 
        ctx.fillRect(BORDER_SIDES, BORDER_SIDES, IMAGE_SIZE, IMAGE_SIZE);
    </script>
</body>
</html>
